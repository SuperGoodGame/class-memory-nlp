[workspace]
channels = [
  "conda-forge",
]
name = "nlp"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
HF_HUB_OFFLINE = "1"
TRANSFORMERS_OFFLINE = "1"
PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION = "python"

[tasks]
build-db = "python -m nlp_baselines.create_database"
rag = "python -m nlp_baselines.query_data"
rag-eval = "python -m nlp_baselines.query_data --eval"
full-eval = "python -m nlp_baselines.query_no_memory --eval"
summary = "python -m nlp_baselines.query_summary_memory"
summary-eval = "python -m nlp_baselines.query_summary_memory --eval"
memory-full-eval = "python -m nlp_baselines.evaluate_memory_ops --method full"
memory-rag-eval = "python -m nlp_baselines.evaluate_memory_ops --method rag"
memory-summary-eval = "python -m nlp_baselines.evaluate_memory_ops --method summary"

[dependencies]
python = "3.12.*"
pip = "*"
numpy = ">=1.26,<3"
requests = ">=2.32,<3"
python-dotenv = ">=1.0,<2"
sentence-transformers = ">=3.0,<6"
pytorch = ">=2.5,<2.7"
matplotlib = "*"
pypdf = "*"
