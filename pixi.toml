[workspace]
channels = [
  "conda-forge",
]
name = "nlp"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
HF_HUB_OFFLINE = "1"
TRANSFORMERS_OFFLINE = "1"
PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION = "python"

[tasks]
build-db = "python -m nlp_baselines.create_database"
rag = "python -m nlp_baselines.query_data"
rag-eval = "python -m nlp_baselines.query_data --eval"
full-eval = "python -m nlp_baselines.query_no_memory --eval"
summary = "python -m nlp_baselines.query_summary_memory"
summary-eval = "python -m nlp_baselines.query_summary_memory --eval"
test = "python -m unittest tests.test_local_generation tests.test_benchmark_loaders tests.test_longbench_metrics tests.test_longbench_structured_memory"
download-longbench = "python -m nlp_baselines.download_longbench_samples --sample-size 50"
build-longbench-structured-memory = "python -m nlp_baselines.longbench_structured_memory --limit 50 --max-workers 4"
retrieval-eval = "python -m nlp_baselines.evaluate_retrieval_only"
local-gemma4-eval = "python -m nlp_baselines.evaluate_local_generation --max-context-chars 8000"
longbench-retrieval-eval = "python -m nlp_baselines.evaluate_longbench --skip-generation --retrieval-limit 50"
longbench-gemma4-eval = "python -m nlp_baselines.evaluate_longbench --skip-retrieval --generation-limit 50 --max-context-chars 8000 --max-tokens 96"
longbench-structured-retrieval-eval = "python -m nlp_baselines.evaluate_longbench --skip-generation --retrieval-limit 50 --memory-mode structured --summary-workers 4"
longbench-structured-gemma4-eval = "python -m nlp_baselines.evaluate_longbench --skip-retrieval --generation-limit 50 --memory-mode structured --summary-workers 4 --max-context-chars 8000 --max-tokens 96"

[dependencies]
python = "3.12.*"
pip = "*"
numpy = ">=1.26,<3"
requests = ">=2.32,<3"
python-dotenv = ">=1.0,<2"
sentence-transformers = ">=3.0,<6"
pytorch = ">=2.5,<2.7"
matplotlib = "*"
pypdf = "*"
